<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mantis Homemade | Menü</title>
  <meta name="description" content="Mantis Homemade dijital restoran menüsü." />
  <meta name="theme-color" content="#2d1711" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="menu-data.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { mantis: { cream:'#fbf6ef', paper:'#fffdf9', gold:'#c79a63', brown:'#5c3525', dark:'#2d1711' } },
          boxShadow: { soft:'0 18px 45px rgba(45,23,17,.10)', float:'0 28px 70px rgba(45,23,17,.16)' }
        }
      }
    }
  </script>
  <style>
    :root{--dark:#2d1711;--brown:#5c3525;--cream:#fbf6ef;--paper:#fffdf9;--muted:#7d6d64;--line:rgba(45,23,17,.10)}
    *{box-sizing:border-box}
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(1000px 520px at 10% -10%,rgba(199,154,99,.22),transparent 58%),radial-gradient(900px 520px at 100% 0%,rgba(92,53,37,.12),transparent 55%),linear-gradient(180deg,#fbf6ef 0%,#f4ede3 100%);color:var(--dark)}
    .hide-scroll::-webkit-scrollbar{display:none}.hide-scroll{-ms-overflow-style:none;scrollbar-width:none}
    .glass{background:rgba(255,253,249,.86);border:1px solid var(--line);box-shadow:0 18px 45px rgba(45,23,17,.08);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
    .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.line-clamp-3{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .cat-btn{border:1px solid rgba(45,23,17,.10);background:rgba(255,253,249,.88);color:#5c3525}.cat-btn.active{background:#2d1711;color:#fff8ef;border-color:#2d1711;box-shadow:0 10px 24px rgba(45,23,17,.22)}
    .photo-bg{background:radial-gradient(circle at 50% 10%,rgba(255,255,255,.56),transparent 32%),linear-gradient(180deg,#fff7ec 0%,#ead8c5 100%)}
    .drawer-open{overflow:hidden}
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
    <header class="sticky top-0 z-50 pt-3 sm:pt-4">
      <nav class="glass rounded-[28px] px-4 sm:px-5 py-3">
        <div class="flex items-center gap-3">
          <a href="menu.html" class="flex items-center gap-3 min-w-0">
            <div class="h-11 w-11 rounded-2xl bg-mantis-dark text-white grid place-items-center text-lg shadow-soft">M</div>
            <div class="min-w-0">
              <div class="font-semibold tracking-tight text-lg sm:text-xl truncate">Mantis Homemade</div>
              <div id="subText" class="text-xs sm:text-sm text-stone-500">Dijital Menü</div>
            </div>
          </a>
          <div class="flex-1"></div>
          <div class="hidden lg:flex items-center gap-2" id="desktopCats"></div>
          <select id="lang" class="h-11 rounded-2xl px-3 bg-white/80 border border-black/10 text-sm font-semibold outline-none text-mantis-dark">
            <option value="tr">TR</option><option value="en">EN</option><option value="mk">MK</option><option value="sq">AL</option>
          </select>
          <button id="menuBtn" class="lg:hidden h-11 w-11 rounded-2xl border border-black/10 bg-white/80 grid place-items-center text-xl" aria-label="Menüyü aç">☰</button>
        </div>
        <div class="mt-3 lg:hidden flex gap-2 overflow-x-auto hide-scroll pb-1" id="mobileChips"></div>
      </nav>
    </header>

    <div id="drawer" class="fixed inset-0 z-[999] hidden">
      <button id="drawerBg" class="absolute inset-0 bg-black/45 w-full h-full" aria-label="Menüyü kapat"></button>
      <aside class="absolute right-0 top-0 h-full w-[88%] max-w-sm bg-[#fffaf5] shadow-2xl rounded-l-[32px] p-5 overflow-y-auto">
        <div class="flex items-start justify-between gap-4">
          <div><div id="drawerTitle" class="text-xl font-semibold">Kategoriler</div><p id="drawerDesc" class="mt-1 text-sm text-stone-500">Menü bölümleri</p></div>
          <button id="closeDrawer" class="h-11 w-11 rounded-2xl bg-mantis-dark text-white grid place-items-center">✕</button>
        </div>
        <div id="drawerCats" class="mt-5 space-y-2"></div>
      </aside>
    </div>

    <main>
      <section class="mt-5 rounded-[34px] overflow-hidden shadow-float bg-mantis-dark text-white relative">
        <div class="absolute inset-0 opacity-30" style="background:radial-gradient(700px 360px at 75% 20%,rgba(199,154,99,.65),transparent 55%);"></div>
        <div class="relative p-6 sm:p-8 lg:p-10 grid gap-6 lg:grid-cols-[1.25fr_.75fr] lg:items-end">
          <div>
            <div class="inline-flex items-center gap-2 rounded-full bg-white/10 border border-white/15 px-4 py-2 text-sm"><span>🍽️</span><span id="heroBadge">Restoran menüsü</span></div>
            <h1 id="pageTitle" class="mt-5 text-4xl sm:text-5xl font-semibold tracking-tight">Mantis Menü</h1>
            <p id="heroText" class="mt-3 max-w-2xl text-white/75 leading-relaxed">Kategoriyi seç, ürünleri fotoğraflarıyla incele.</p>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="rounded-3xl bg-white/10 border border-white/15 p-4"><div id="catLabel" class="text-xs uppercase tracking-[.18em] text-white/45">Kategori</div><div id="catName" class="mt-2 font-semibold text-lg">—</div></div>
            <div class="rounded-3xl bg-white/10 border border-white/15 p-4"><div id="itemLabel" class="text-xs uppercase tracking-[.18em] text-white/45">Ürün</div><div id="countText" class="mt-2 font-semibold text-lg">—</div></div>
          </div>
        </div>
      </section>

      <section class="mt-5 glass rounded-[28px] p-3 sm:p-4 flex gap-3 items-center">
        <div class="h-11 w-11 rounded-2xl bg-mantis-dark/5 grid place-items-center">⌕</div>
        <input id="search" class="w-full bg-transparent outline-none text-base placeholder:text-stone-400" placeholder="Ürün ara..." />
      </section>

      <section class="mt-6">
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5"></div>
        <div id="empty" class="hidden glass rounded-[28px] p-8 text-center text-stone-500">Sonuç bulunamadı.</div>
      </section>
    </main>
  </div>

  <script>
    const MENU = window.MANTIS_MENU || [];
    const els = {
      lang:document.getElementById('lang'), desktopCats:document.getElementById('desktopCats'), mobileChips:document.getElementById('mobileChips'), drawer:document.getElementById('drawer'), drawerCats:document.getElementById('drawerCats'), grid:document.getElementById('grid'), empty:document.getElementById('empty'), search:document.getElementById('search')
    };
    const state = { lang: localStorage.getItem('mantis_lang') || 'tr', cat: (MENU[0]&&MENU[0].key)||'', q:'' };
    const T = {
      tr:{sub:'Dijital Menü', title:'Mantis Menü', badge:'Restoran menüsü', hero:'Kategoriyi seç, ürünleri fotoğraflarıyla incele.', cats:'Kategoriler', catDesc:'Menü bölümleri', search:'Ürün ara...', count:n=>`${n} ürün`, detail:'Detaya bak', category:'Kategori', item:'Ürün', empty:'Sonuç bulunamadı.'},
      en:{sub:'Digital Menu', title:'Mantis Menu', badge:'Restaurant menu', hero:'Choose a category and browse products with photos.', cats:'Categories', catDesc:'Menu sections', search:'Search product...', count:n=>`${n} items`, detail:'View details', category:'Category', item:'Item', empty:'No results found.'},
      mk:{sub:'Дигитално мени', title:'Mantis Мени', badge:'Ресторанско мени', hero:'Изберете категорија и разгледајте производи со фотографии.', cats:'Категории', catDesc:'Секции од менито', search:'Пребарај...', count:n=>`${n} производи`, detail:'Детали', category:'Категорија', item:'Производ', empty:'Нема резултати.'},
      sq:{sub:'Menu Digjitale', title:'Mantis Menu', badge:'Menu restoranti', hero:'Zgjidh kategorinë dhe shiko produktet me fotografi.', cats:'Kategoritë', catDesc:'Seksionet e menusë', search:'Kërko produkt...', count:n=>`${n} produkte`, detail:'Shiko detajet', category:'Kategori', item:'Produkt', empty:'Nuk u gjet rezultat.'}
    };
    const pick = obj => (obj && (obj[state.lang] || obj.tr || obj.sq || obj.en || obj.mk)) || '';
    const esc = s => String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    function currentCat(){ return MENU.find(c=>c.key===state.cat) || MENU[0]; }
    function openDrawer(){ els.drawer.classList.remove('hidden'); document.body.classList.add('drawer-open'); }
    function closeDrawer(){ els.drawer.classList.add('hidden'); document.body.classList.remove('drawer-open'); }
    document.getElementById('menuBtn').onclick=openDrawer; document.getElementById('closeDrawer').onclick=closeDrawer; document.getElementById('drawerBg').onclick=closeDrawer;
    function catButton(c, extra=''){
      const active=c.key===state.cat?'active':'';
      return `<button class="cat-btn ${active} ${extra} rounded-2xl px-4 py-2.5 text-sm font-medium whitespace-nowrap transition" data-cat="${c.key}"><span class="mr-1.5">${c.icon||'•'}</span>${esc(pick(c.title))}</button>`;
    }
    function bindCatButtons(root){ root.querySelectorAll('[data-cat]').forEach(btn=>btn.onclick=()=>{state.cat=btn.dataset.cat; state.q=''; els.search.value=''; closeDrawer(); render(); window.scrollTo({top:0,behavior:'smooth'});}); }
    function renderCats(){
      els.desktopCats.innerHTML = MENU.slice(0,5).map(c=>catButton(c)).join('') + `<button id="desktopMore" class="cat-btn rounded-2xl px-4 py-2.5 text-sm font-medium">☰</button>`;
      document.getElementById('desktopMore').onclick=openDrawer; bindCatButtons(els.desktopCats);
      els.mobileChips.innerHTML = MENU.map(c=>catButton(c)).join(''); bindCatButtons(els.mobileChips);
      els.drawerCats.innerHTML = MENU.map(c=>`<button class="w-full rounded-2xl px-4 py-3 text-left border transition ${c.key===state.cat?'bg-mantis-dark text-white border-mantis-dark':'bg-white border-black/10 text-mantis-dark'}" data-cat="${c.key}"><div class="font-semibold">${c.icon||'•'} ${esc(pick(c.title))}</div><div class="text-xs ${c.key===state.cat?'text-white/65':'text-stone-500'} mt-0.5">${T[state.lang].count((c.items||[]).length)}</div></button>`).join(''); bindCatButtons(els.drawerCats);
    }
    function renderText(){ const t=T[state.lang]; document.getElementById('subText').textContent=t.sub; document.getElementById('pageTitle').textContent=t.title; document.getElementById('heroBadge').textContent=t.badge; document.getElementById('heroText').textContent=t.hero; document.getElementById('drawerTitle').textContent=t.cats; document.getElementById('drawerDesc').textContent=t.catDesc; document.getElementById('catLabel').textContent=t.category; document.getElementById('itemLabel').textContent=t.item; els.search.placeholder=t.search; els.empty.textContent=t.empty; }
    function renderGrid(){
      const t=T[state.lang], cat=currentCat();
      let items=(cat.items||[]).filter(it=>{ const q=state.q.trim().toLowerCase(); if(!q) return true; return [pick(it.name), pick(it.desc), it.price].join(' ').toLowerCase().includes(q); });
      document.getElementById('catName').textContent = pick(cat.title);
      document.getElementById('countText').textContent = t.count(items.length);
      els.empty.classList.toggle('hidden', items.length>0);
      els.grid.innerHTML = items.map(it=>{
        const name=pick(it.name), desc=pick(it.desc), price=it.price||'', img=it.img||'';
        return `<a href="product.html?id=${encodeURIComponent(it.id)}&lang=${encodeURIComponent(state.lang)}" class="group bg-mantis-paper rounded-[30px] border border-black/10 shadow-soft overflow-hidden hover:-translate-y-1 hover:shadow-float transition duration-300">
          <div class="photo-bg aspect-[1.08/1] p-3 sm:p-4 flex items-center justify-center overflow-hidden border-b border-black/10">${img?`<img src="${esc(img)}" alt="${esc(name)}" loading="lazy" class="h-full w-full object-contain drop-shadow-xl group-hover:scale-[1.04] transition duration-500">`:`<div class="text-stone-400 text-sm">Fotoğraf eklenecek</div>`}</div>
          <div class="p-4 sm:p-5"><div class="flex items-start justify-between gap-3"><h3 class="text-lg font-semibold leading-tight line-clamp-2">${esc(name)}</h3>${price?`<div class="shrink-0 rounded-full bg-mantis-dark text-white px-3 py-1.5 text-sm font-semibold whitespace-nowrap">${esc(price)}</div>`:''}</div>${desc?`<p class="mt-2 text-sm text-stone-600 leading-relaxed line-clamp-3">${esc(desc)}</p>`:''}<div class="mt-4 text-sm font-semibold text-mantis-brown">${t.detail} →</div></div>
        </a>`;
      }).join('');
    }
    function render(){ renderText(); renderCats(); renderGrid(); }
    els.lang.value=state.lang; els.lang.onchange=()=>{state.lang=els.lang.value; localStorage.setItem('mantis_lang',state.lang); render();}; els.search.oninput=e=>{state.q=e.target.value; renderGrid();}; render();
  </script>
</body>
</html>
