<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mantis Homemade | Ürün</title>
  <meta name="theme-color" content="#2d1711" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="menu-data.js"></script>
  <script>
    tailwind.config={theme:{extend:{colors:{mantis:{cream:'#fbf6ef',paper:'#fffdf9',gold:'#c79a63',brown:'#5c3525',dark:'#2d1711'}},boxShadow:{soft:'0 18px 45px rgba(45,23,17,.10)',float:'0 28px 70px rgba(45,23,17,.16)'}}}}
  </script>
  <style>
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(1000px 520px at 10% -10%,rgba(199,154,99,.22),transparent 58%),radial-gradient(900px 520px at 100% 0%,rgba(92,53,37,.12),transparent 55%),linear-gradient(180deg,#fbf6ef 0%,#f4ede3 100%);color:#2d1711}.glass{background:rgba(255,253,249,.88);border:1px solid rgba(45,23,17,.10);box-shadow:0 18px 45px rgba(45,23,17,.08);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}.photo-bg{background:radial-gradient(circle at 50% 10%,rgba(255,255,255,.56),transparent 32%),linear-gradient(180deg,#fff7ec 0%,#ead8c5 100%)}
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
    <header class="sticky top-0 z-50 pt-3 sm:pt-4">
      <nav class="glass rounded-[28px] px-4 sm:px-5 py-3 flex items-center gap-3">
        <a href="menu.html" class="h-11 w-11 rounded-2xl bg-white border border-black/10 grid place-items-center text-xl">←</a>
        <div class="min-w-0"><div class="font-semibold tracking-tight text-lg sm:text-xl truncate">Mantis Homemade</div><div id="sub" class="text-xs sm:text-sm text-stone-500">Ürün Detayı</div></div>
        <div class="flex-1"></div>
        <select id="lang" class="h-11 rounded-2xl px-3 bg-white/80 border border-black/10 text-sm font-semibold outline-none"><option value="tr">TR</option><option value="en">EN</option><option value="mk">MK</option><option value="sq">AL</option></select>
      </nav>
    </header>
    <main class="mt-6 grid gap-6 lg:grid-cols-[1.08fr_.92fr]">
      <section class="glass rounded-[34px] p-4 sm:p-5"><div class="photo-bg rounded-[28px] min-h-[360px] sm:min-h-[520px] border border-black/10 p-5 flex items-center justify-center overflow-hidden"><span id="imgPlaceholder" class="text-stone-400">Fotoğraf eklenecek</span><img id="img" class="hidden h-full w-full object-contain drop-shadow-2xl" alt="" /></div></section>
      <section class="glass rounded-[34px] p-5 sm:p-7 lg:self-start"><div class="inline-flex items-center gap-2 rounded-full bg-mantis-dark text-white px-4 py-2 text-sm"><span>🍽️</span><span id="badge">Ürün Bilgisi</span></div><h1 id="name" class="mt-5 text-3xl sm:text-5xl font-semibold tracking-tight">—</h1><div id="cat" class="mt-2 text-stone-500">—</div><div id="priceBox" class="mt-6 rounded-[28px] bg-white border border-black/10 p-5"><div id="priceLabel" class="text-xs uppercase tracking-[.18em] text-stone-400">Fiyat</div><div id="price" class="mt-2 text-3xl font-semibold">—</div></div><div id="descBox" class="mt-5 rounded-[28px] bg-white border border-black/10 p-5 hidden"><div id="descTitle" class="text-xs uppercase tracking-[.18em] text-stone-400">Açıklama</div><p id="desc" class="mt-3 text-base leading-relaxed text-stone-700"></p></div><div class="mt-5 rounded-[24px] bg-mantis-dark/5 border border-black/10 p-4 text-sm text-stone-600"><span id="note">Alerjen bilgisi için personelden destek isteyin.</span></div></section>
    </main>
  </div>
  <script>
    const MENU=window.MANTIS_MENU||[], qs=new URLSearchParams(location.search), id=qs.get('id');
    const state={lang:qs.get('lang')||localStorage.getItem('mantis_lang')||'tr', item:null, cat:null};
    const T={tr:{sub:'Ürün Detayı',badge:'Ürün Bilgisi',price:'Fiyat',desc:'Açıklama',note:'Alerjen bilgisi için personelden destek isteyin.',missing:'Ürün bulunamadı',photo:'Fotoğraf eklenecek'},en:{sub:'Item Details',badge:'Item Info',price:'Price',desc:'Description',note:'Ask our staff for allergen information.',missing:'Item not found',photo:'Photo will be added'},mk:{sub:'Детали',badge:'Информации',price:'Цена',desc:'Опис',note:'Прашајте го персоналот за алергени.',missing:'Производот не е пронајден',photo:'Ќе се додаде фотографија'},sq:{sub:'Detaje',badge:'Informacion',price:'Çmimi',desc:'Përshkrimi',note:'Pyesni stafin për alergjenë.',missing:'Produkti nuk u gjet',photo:'Fotografia do të shtohet'}};
    const pick=obj=>(obj&&(obj[state.lang]||obj.tr||obj.sq||obj.en||obj.mk))||'';
    function find(){for(const c of MENU){const it=(c.items||[]).find(x=>x.id===id); if(it) return {it,c};} return null;}
    function render(){const t=T[state.lang]; document.getElementById('sub').textContent=t.sub;document.getElementById('badge').textContent=t.badge;document.getElementById('priceLabel').textContent=t.price;document.getElementById('descTitle').textContent=t.desc;document.getElementById('note').textContent=t.note;document.getElementById('imgPlaceholder').textContent=t.photo; if(!state.item){document.getElementById('name').textContent=t.missing;document.getElementById('cat').textContent='';document.getElementById('priceBox').classList.add('hidden');return;} const name=pick(state.item.name), desc=pick(state.item.desc), img=state.item.img||''; document.title=`Mantis Homemade | ${name}`;document.getElementById('name').textContent=name;document.getElementById('cat').textContent=pick(state.cat.title);document.getElementById('price').textContent=state.item.price||'—';document.getElementById('priceBox').classList.toggle('hidden',!state.item.price); const box=document.getElementById('descBox'); box.classList.toggle('hidden',!desc); document.getElementById('desc').textContent=desc; const im=document.getElementById('img'), ph=document.getElementById('imgPlaceholder'); if(img){im.src=img;im.alt=name;im.classList.remove('hidden');ph.classList.add('hidden')} else {im.classList.add('hidden');ph.classList.remove('hidden')}}
    const found=find(); if(found){state.item=found.it;state.cat=found.c;} const lang=document.getElementById('lang'); lang.value=state.lang; lang.onchange=()=>{state.lang=lang.value;localStorage.setItem('mantis_lang',state.lang);render()}; render();
  </script>
</body>
</html>
